name: inventory_pro
description: "Inventory Pro - Offline-first inventory management system"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7
  dartz: ^0.10.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.1
  fl_chart: ^1.2.0
  image_picker: ^1.2.2
  mobile_scanner: ^7.2.0
  pdf: ^3.12.0
  excel: ^4.0.6
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
